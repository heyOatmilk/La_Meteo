<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap"
      rel="stylesheet"
    />
    <title>La Météo</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form">
          <br />
          <input
            type="search"
            placeholder="Enter a city..."
            required
            class="search-form-input"
          />

          <input type="submit" value="Search" class="search-form-button" />
        </form>
      </header>

      <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city">Paris</h1>
            <p class="weather-app-details">
              Monday 21:13, clear sky
              <br />
              Humidity: <strong>43%</strong>, Wind: <strong>4.12km/h</strong>
            </p>
          </div>
          <div class="weather-app-temperature-container">
            <div class="weather-app-icon">⛅</div>
            <div class="weather-app-temperature">12</div>
            <div class="weather-app-temperature-unit">°C</div>
          </div>
        </div>
      </main>

      <footer>
        This project is coded by
        <a href="https://github.com/heyOatmilk" target="_blank">heyOatmilk</a>,
        is
        <a href="https://github.com/heyOatmilk/La_Meteo" target="_blank"
          >open-sourced on GitHub</a
        >
        and
        <a href="https://la-meteo-forecast.netlify.app/" target="_blank">
          hosted on Netlify</a
        >
      </footer>
    </div>
  </body>
</html>
